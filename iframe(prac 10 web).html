<!DOCTYPE html>
<html>
<head>
    <title>Advanced iFrame Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            display: flex;
            height: calc(100vh - 100px);
        }

        .menu {
            width: 250px;
            background: #f4f4f4;
            padding: 15px;
            border-right: 2px solid #ccc;
        }

        .menu h3 {
            margin-top: 0;
        }

        .menu a {
            display: block;
            padding: 10px;
            margin: 8px 0;
            background: #ddd;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .menu a:hover {
            background: #333;
            color: white;
        }

        .content {
            flex: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            height: 50px;
            background: #333;
            color: white;
            text-align: center;
            line-height: 50px;
        }

        .btn {
            margin-top: 10px;
            padding: 8px;
            width: 100%;
            border: none;
            background: #333;
            color: white;
            cursor: pointer;
        }

        .btn:hover {
            background: #555;
        }
    </style>

    <script>
        function loadHome() {
            document.getElementById("frame").src =
                "data:text/html,<h2>Home Page</h2><p>Welcome to the advanced iframe demo.</p>";
        }

        function loadMap() {
            document.getElementById("frame").src =
                "data:text/html,<h2>Map</h2><iframe src='https://www.google.com/maps?q=Nagpur&output=embed' width='100%' height='400'></iframe>";
        }

        function loadExternal() {
            document.getElementById("frame").src = "https://www.wikipedia.org";
        }

        function reloadFrame() {
            document.getElementById("frame").contentWindow.location.reload();
        }
    </script>

</head>

<body>

<header>
    <h1>Advanced iFrame Web Page</h1>
</header>

<div class="container">

    <!-- Sidebar -->
    <div class="menu">
        <h3>Navigation</h3>

        <a href="#" onclick="loadHome()">🏠 Home</a>
        <a href="#" onclick="loadMap()">🗺️ View Map</a>
        <a href="#" onclick="loadExternal()">🌐 Wikipedia</a>

        <button class="btn" onclick="reloadFrame()">🔄 Reload Content</button>
    </div>

    <!-- Main Content -->
    <div class="content">
        <iframe id="frame"
            src="data:text/html,<h2>Welcome</h2><p>Select an option from the menu.</p>">
        </iframe>
    </div>

</div>

<footer>
    © 2026 iFrame Demo Page
</footer>

</body>
</html>
